<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact – Erin Payne</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'EB Garamond', serif;
      background-color: #0d0d0d; 
      color: #eaeaea;            
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Navigation - Consistent with your other pages */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 30px 60px;
      border-bottom: 1px solid #222; 
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }
    nav .name { font-weight: 500; font-size: 3.0rem; margin-left: -40px; }
    nav .links a {
      position: relative;
      margin-left: 30px;
      text-decoration: none;
      font-weight: 500;
      color: #aaa; 
      font-size: 1.3rem;
      transition: color 0.4s;
    }
    nav .links a:hover { color: #fff; }

    /* Main Content Container */
    .contact-wrapper {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
    }

    .contact-card {
      text-align: center;
      max-width: 500px;
      width: 100%;
      padding: 60px;
      border: 1px solid #222;
      background: rgba(255, 255, 255, 0.02); /* Subtle glass effect */
      border-radius: 4px;
    }

    .contact-card h1 {
      font-size: 3rem;
      font-weight: 500;
      margin-bottom: 40px;
      letter-spacing: 1px;
    }

    .contact-item {
      margin-bottom: 25px;
    }

    .contact-label {
      display: block;
      font-size: 0.9rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 5px;
    }

    .contact-link {
      font-size: 1.5rem;
      color: #fff;
      text-decoration: none;
      transition: color 0.3s ease;
      word-break: break-all;
    }

    .contact-link:hover {
      color: #aaa;
    }

    footer {
      text-align: center;
      padding: 40px 0;
      font-size: 0.8rem;
      color: #555;
      border-top: 1px solid #222;
    }

    @media (max-width: 900px) {
      nav .name { margin-left: 0; font-size: 2rem; }
      nav { padding: 20px; flex-direction: column; gap: 20px; }
      .contact-card { padding: 40px 20px; border: none; background: none; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="name">Erin Payne</div>
    <div class="links">
      <a href="index.html">About</a>
      <a href="projects.html">Projects</a>
      <a href="experience.html">Experience</a>
      <a href="contact.html">Contact</a>
    </div>
  </nav>

  <main class="contact-wrapper">
    <div class="contact-card">
      <h1>Contact</h1>
      
      <div class="contact-item">
        <span class="contact-label">Email</span>
        <a href="mailto:erin.payne.01@gmail.com" class="contact-link">erin.payne.01@gmail.com</a>
      </div>

      <div class="contact-item">
        <span class="contact-label">Professional</span>
        <a href="https://linkedin.com/in/erin-payne3141" target="_blank" class="contact-link">LinkedIn</a>
      </div>

      <div class="contact-item">
        <span class="contact-label">Location</span>
        <p class="contact-link" style="cursor: default;">Kingston, Ontario</p>
      </div>
    </div>
  </main>

  <footer>
    <p>© 2026 Erin Payne</p>
  </footer>

</body>
</html>
